<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YKS Flow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #E1F5FE 0%, #B3E5FC 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            width: 100%;
            max-width: 400px;
            min-height: 700px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .timer-box, .combo-box {
            background: white;
            border: 2px solid #0288D1;
            border-radius: 15px;
            padding: 10px 15px;
            text-align: center;
            width: 80px;
        }

        .timer-box { border-color: #D32F2F; }
        .combo-box { border-color: #F06292; }

        .timer { font-size: 18px; font-weight: bold; color: #D32F2F; }
        .combo { font-size: 18px; font-weight: bold; color: #F06292; }

        .score-box {
            background: white;
            border: 2px solid #0288D1;
            border-radius: 15px;
            padding: 10px 20px;
            text-align: center;
        }

        .score { font-size: 22px; font-weight: bold; color: #0288D1; }

        .mode-indicator {
            text-align: center;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: bold;
            padding: 5px 15px;
            border-radius: 15px;
            display: inline-block;
            align-self: center;
        }

        .mode-easy { background: #E8F5E9; color: #388E3C; border: 2px solid #81C784; }
        .mode-hard { background: #FFEBEE; color: #C62828; border: 2px solid #EF5350; }
        .mode-ki { background: #F3E5F5; color: #6A1B9A; border: 2px solid #CE93D8; }

        .question-area {
            margin-top: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .question-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        /* Ki mode sentence display */
        .ki-sentence-box {
            background: linear-gradient(135deg, #EDE7F6 0%, #E1BEE7 100%);
            border: 2.5px solid #9C27B0;
            border-radius: 20px;
            padding: 20px 15px;
            margin: 10px 0 20px 0;
            text-align: center;
        }

        .ki-sentence-text {
            font-size: 17px;
            font-weight: bold;
            color: #4A148C;
            line-height: 1.6;
        }

        .ki-d1 { color: #4A148C; }
        .ki-d2 { color: #4A148C; }

        .ki-highlight {
            background: #9C27B0;
            color: white;
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 18px;
        }

        .ki-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        .ki-answer-btn {
            background: white;
            border: 3px solid #9C27B0;
            border-radius: 15px;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            color: #4A148C;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .ki-answer-btn:not(.correct):not(.wrong):hover {
            background: linear-gradient(135deg, #CE93D8 0%, #BA68C8 100%);
            color: white;
            transform: scale(1.02);
        }

        .ki-answer-btn.correct {
            background: linear-gradient(135deg, #81C784 0%, #66BB6A 100%) !important;
            border-color: #388E3C !important;
            color: white !important;
            pointer-events: none;
        }

        .ki-answer-btn.wrong {
            background: linear-gradient(135deg, #E57373 0%, #EF5350 100%) !important;
            border-color: #D32F2F !important;
            color: white !important;
            pointer-events: none;
        }

        .card {
            background: linear-gradient(135deg, #4FC3F7 0%, #29B6F6 100%);
            border: 2.5px solid #0288D1;
            border-radius: 20px;
            padding: 18px 15px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .card:hover { transform: scale(1.02); box-shadow: 0 8px 25px rgba(79, 195, 247, 0.4); }
        .card:active { transform: scale(0.98); }

        .card-text {
            font-size: 18px;
            font-weight: bold;
            color: #1A237E;
            background: white;
            padding: 12px 15px;
            border-radius: 15px;
        }

        .card-hard { padding: 15px 12px; margin: 8px 0; }
        .card-text-hard { font-size: 16px; padding: 10px 12px; }

        .garden { text-align: center; margin-top: 20px; padding: 10px; }
        .garden-label { font-size: 40px; }
        .garden-text { font-size: 16px; color: #666; margin-top: 10px; }

        .game-over {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .game-over h2 { color: #D32F2F; font-size: 28px; margin-bottom: 20px; }
        .final-score { font-size: 36px; font-weight: bold; color: #0288D1; margin-bottom: 10px; }
        .max-combo { font-size: 24px; font-weight: bold; color: #F06292; margin-bottom: 20px; }

        .game-over-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .restart-btn, .review-btn {
            border: none;
            border-radius: 25px;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .restart-btn {
            background: linear-gradient(135deg, #4FC3F7 0%, #29B6F6 100%);
            color: #1A237E;
        }

        .review-btn {
            background: linear-gradient(135deg, #FF8A65 0%, #FF7043 100%);
            color: white;
            border: 2px solid #E64A19;
        }

        .restart-btn:hover, .review-btn:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(0,0,0,0.2); }

        .correct { background: linear-gradient(135deg, #81C784 0%, #66BB6A 100%) !important; border-color: #388E3C !important; }
        .wrong { background: linear-gradient(135deg, #E57373 0%, #EF5350 100%) !important; border-color: #D32F2F !important; }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .time-bonus { animation: pulse 0.5s ease; color: #388E3C !important; }
        .time-penalty { animation: shake 0.5s ease; color: #D32F2F !important; }

        .start-menu, .mode-menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 600px;
            text-align: center;
        }

        .mode-menu { display: none; }

        .record-display {
            background: linear-gradient(135deg, #FFD700 0%, #FFA000 100%);
            border: 3px solid #FF8F00;
            border-radius: 20px;
            padding: 15px 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(255, 160, 0, 0.3);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 4px 15px rgba(255, 160, 0, 0.3); }
            to { box-shadow: 0 6px 25px rgba(255, 160, 0, 0.5); }
        }

        .record-label { font-size: 14px; color: #E65100; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .record-score { font-size: 32px; font-weight: bold; color: #BF360C; margin-top: 5px; }

        .start-title { font-size: 32px; font-weight: bold; color: #0288D1; margin-bottom: 10px; }
        .start-subtitle { font-size: 18px; color: #666; margin-bottom: 40px; }

        /* Game type selection */
        .game-type-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 320px;
            margin-bottom: 10px;
        }

        .game-type-btn {
            background: white;
            border: 3px solid;
            border-radius: 20px;
            padding: 20px 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .game-type-btn:hover { transform: scale(1.03); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }

        .game-type-btn.kelime {
            border-color: #0288D1;
            color: #01579B;
        }

        .game-type-btn.kelime:hover {
            background: linear-gradient(135deg, #4FC3F7 0%, #29B6F6 100%);
            color: white;
        }

        .game-type-btn.ki {
            border-color: #9C27B0;
            color: #4A148C;
        }

        .game-type-btn.ki:hover {
            background: linear-gradient(135deg, #CE93D8 0%, #BA68C8 100%);
            color: white;
        }

        .game-type-btn.selected-type.kelime {
            background: linear-gradient(135deg, #4FC3F7 0%, #29B6F6 100%);
            color: white;
        }

        .game-type-btn.selected-type.ki {
            background: linear-gradient(135deg, #CE93D8 0%, #BA68C8 100%);
            color: white;
        }

        .game-type-desc { font-size: 12px; font-weight: normal; opacity: 0.9; }

        .mode-options {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 320px;
        }

        .mode-btn {
            background: white;
            border: 3px solid;
            border-radius: 20px;
            padding: 25px 20px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .mode-btn:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .mode-btn.easy { border-color: #81C784; color: #388E3C; }
        .mode-btn.easy:hover { background: linear-gradient(135deg, #81C784 0%, #66BB6A 100%); color: white; }
        .mode-btn.hard { border-color: #EF5350; color: #C62828; }
        .mode-btn.hard:hover { background: linear-gradient(135deg, #EF5350 0%, #E53935 100%); color: white; }
        .mode-btn.selected.easy { background: linear-gradient(135deg, #81C784 0%, #66BB6A 100%); color: white; transform: scale(1.05); }
        .mode-btn.selected.hard { background: linear-gradient(135deg, #EF5350 0%, #E53935 100%); color: white; transform: scale(1.05); }
        .mode-desc { font-size: 13px; font-weight: normal; opacity: 0.9; }

        .time-options { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 300px; }

        .time-btn {
            background: white;
            border: 3px solid #0288D1;
            border-radius: 20px;
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #0288D1;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .time-btn:hover { background: linear-gradient(135deg, #4FC3F7 0%, #29B6F6 100%); color: white; transform: scale(1.05); }
        .time-btn.selected { background: linear-gradient(135deg, #4FC3F7 0%, #29B6F6 100%); color: white; }

        .start-btn, .next-btn, .back-btn {
            border: none;
            border-radius: 25px;
            padding: 18px 50px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 30px;
        }

        .start-btn { background: linear-gradient(135deg, #81C784 0%, #66BB6A 100%); box-shadow: 0 4px 15px rgba(129,199,132,0.4); }
        .next-btn { background: linear-gradient(135deg, #4FC3F7 0%, #29B6F6 100%); box-shadow: 0 4px 15px rgba(79,195,247,0.4); }
        .back-btn { background: #BDBDBD; box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-size: 16px; padding: 12px 30px; margin-top: 15px; }
        .start-btn:hover, .next-btn:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(0,0,0,0.2); }
        .back-btn:hover { background: #9E9E9E; transform: scale(1.05); }
        .start-btn:disabled, .next-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }

        .game-content { display: none; }
        .emoji-icon { font-size: 24px; }

        .new-record { animation: celebrate 1s ease; color: #FFD700; text-shadow: 0 0 10px rgba(255,215,0,0.8); }
        @keyframes celebrate { 0%, 100% { transform: scale(1); } 25% { transform: scale(1.2) rotate(-5deg); } 50% { transform: scale(1.3) rotate(5deg); } 75% { transform: scale(1.2) rotate(-5deg); } }

        .review-screen {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255,255,255,0.98);
            z-index: 100;
            padding: 20px;
            overflow-y: auto;
        }

        .review-header { text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #E0E0E0; }
        .review-title { font-size: 24px; font-weight: bold; color: #D32F2F; margin-bottom: 5px; }
        .review-subtitle { font-size: 14px; color: #666; }
        .mistake-list { display: flex; flex-direction: column; gap: 15px; margin-bottom: 80px; }

        .mistake-item {
            background: white;
            border: 2px solid #E0E0E0;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .mistake-row { display: flex; align-items: center; gap: 10px; font-size: 16px; flex-wrap: wrap; }
        .wrong-answer { color: #D32F2F; text-decoration: line-through; font-weight: bold; }
        .correct-answer { color: #388E3C; font-weight: bold; background: #E8F5E9; padding: 5px 10px; border-radius: 10px; border: 2px solid #81C784; }
        .arrow-icon { color: #999; font-size: 20px; }
        .mistake-number { background: #FFCDD2; color: #D32F2F; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; flex-shrink: 0; }

        .hard-mode-review .mistake-item { border-color: #FFCDD2; background: linear-gradient(to bottom, #FFF5F5 0%, #ffffff 100%); }

        .all-wrong-options { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #E0E0E0; }
        .wrong-option-label { font-size: 12px; color: #666; font-weight: bold; margin-bottom: 5px; }
        .wrong-options-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .wrong-option-tag { background: #FFEBEE; color: #C62828; padding: 5px 10px; border-radius: 12px; font-size: 14px; font-weight: bold; border: 1px solid #EF9A9A; }
        .selected-wrong { background: #EF5350 !important; color: white !important; border-color: #C62828 !important; animation: shake 0.5s ease; }

        /* Ki review styles */
        .ki-review-item { border-color: #E1BEE7; background: linear-gradient(to bottom, #F3E5F5 0%, #ffffff 100%); }
        .ki-correct-tag { background: #E8F5E9; color: #2E7D32; padding: 5px 10px; border-radius: 10px; font-size: 14px; font-weight: bold; border: 1px solid #81C784; }
        .ki-wrong-tag { background: #EF5350; color: white; padding: 5px 10px; border-radius: 10px; font-size: 14px; font-weight: bold; }
        .ki-sentence-review { font-size: 14px; color: #555; font-style: italic; margin-top: 5px; line-height: 1.5; }

        .review-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 15px 20px; box-shadow: 0 -4px 20px rgba(0,0,0,0.1); display: flex; justify-content: center; gap: 10px; }
        .close-review-btn { background: linear-gradient(135deg, #4FC3F7 0%, #29B6F6 100%); border: none; border-radius: 20px; padding: 12px 30px; font-size: 16px; font-weight: bold; color: white; cursor: pointer; transition: all 0.3s ease; }
        .close-review-btn:hover { transform: scale(1.05); }

        .no-mistakes { text-align: center; padding: 60px 20px; color: #388E3C; }
        .no-mistakes-icon { font-size: 60px; margin-bottom: 20px; }
        .no-mistakes-text { font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>
<div class="game-container">

    <!-- Start Menu -->
    <div class="start-menu" id="start-menu">
        <div class="record-display" id="record-display">
            <div class="record-label">🏆 REKOR</div>
            <div class="record-score" id="record-score">0 PTS</div>
        </div>
        <div class="start-title">🎯 YKS Flow</div>
        <div class="start-subtitle">Türkçe Testi</div>
        <button class="start-btn" onclick="showGameTypeMenu()">Oyuna Başla 🚀</button>
    </div>

    <!-- Game Type Selection -->
    <div class="mode-menu" id="game-type-menu">
        <div class="start-title">📚 Konu Seç</div>
        <div class="start-subtitle">Hangi konuyu test etmek istersin?</div>
        <div class="game-type-options">
            <button class="game-type-btn kelime" onclick="selectGameType('kelime', this)">
                <span class="emoji-icon">✍️</span>
                <span>Kelime Yazımı</span>
                <span class="game-type-desc">Bitişik / ayrı yazım kuralları</span>
            </button>
            <button class="game-type-btn ki" onclick="selectGameType('ki', this)">
                <span class="emoji-icon">🔍</span>
                <span>Ki Dedektifi</span>
                <span class="game-type-desc">Bağlaç / sıfat / zamir olan "ki"</span>
            </button>
        </div>
        <button class="next-btn" id="game-type-next-btn" onclick="showModeMenu()" disabled>İleri →</button>
        <button class="back-btn" onclick="backToStart()">← Geri</button>
    </div>

    <!-- Mode Selection Menu -->
    <div class="mode-menu" id="mode-menu">
        <div class="start-title">🎮 Mod Seç</div>
        <div class="start-subtitle">Zorluk seviyesini seç</div>
        <div class="mode-options">
            <button class="mode-btn easy" onclick="selectMode('easy', this)">
                <span class="emoji-icon">😊</span>
                <span>Kolay Mod</span>
                <span class="mode-desc" id="easy-desc">2 seçenek (1 doğru, 1 yanlış)</span>
            </button>
            <button class="mode-btn hard" onclick="selectMode('hard', this)">
                <span class="emoji-icon">🔥</span>
                <span>Zor Mod</span>
                <span class="mode-desc" id="hard-desc">4 seçenek (1 doğru, 3 yanlış)</span>
            </button>
        </div>
        <button class="next-btn" id="next-btn" onclick="showTimeMenu()" disabled>İleri →</button>
        <button class="back-btn" onclick="backToGameType()">← Geri</button>
    </div>

    <!-- Time Selection Menu -->
    <div class="mode-menu" id="time-menu" style="display:none;">
        <div class="start-title">⏱️ Süre Seç</div>
        <div class="start-subtitle">Oyun süresini belirle</div>
        <div class="time-options">
            <button class="time-btn" onclick="selectTime(30, this)"><span class="emoji-icon">⚡</span><span>30 Saniye</span></button>
            <button class="time-btn" onclick="selectTime(60, this)"><span class="emoji-icon">⏱️</span><span>1 Dakika</span></button>
            <button class="time-btn" onclick="selectTime(120, this)"><span class="emoji-icon">🕐</span><span>2 Dakika</span></button>
        </div>
        <button class="start-btn" id="start-btn" onclick="startGame()" disabled>Başla! 🚀</button>
        <button class="back-btn" onclick="backToMode()">← Geri</button>
    </div>

    <!-- Game Content -->
    <div class="game-content" id="game-content">
        <div class="header">
            <div class="timer-box"><div class="timer" id="timer">60s</div></div>
            <div class="score-box"><div class="score" id="score">0 PTS</div></div>
            <div class="combo-box"><div class="combo" id="combo">🔥 0</div></div>
        </div>
        <div style="text-align:center;">
            <div class="mode-indicator" id="mode-indicator">Kolay Mod</div>
        </div>
        <div class="question-area" id="question-area">
            <div class="question-label" id="question-label">Doğru yazımı seç:</div>
            <div id="cards-container"></div>
        </div>
        <div class="garden" id="garden">
            <div class="garden-label">🪴</div>
            <div class="garden-text" id="garden-text"></div>
        </div>
    </div>

    <!-- Game Over -->
    <div class="game-over" id="game-over">
        <h2>BİTTİ!</h2>
        <div class="final-score" id="final-score">0 PTS</div>
        <div class="max-combo" id="max-combo-display">🔥 En Yüksek Combo: 0</div>
        <div class="game-over-buttons">
            <button class="review-btn" onclick="showReview()">📋 Hataları Gözden Geçir</button>
            <button class="restart-btn" onclick="restartGame()">Tekrar Oyna</button>
        </div>
    </div>

    <!-- Review Screen -->
    <div class="review-screen" id="review-screen">
        <div class="review-header">
            <div class="review-title">📋 Hata Analizi</div>
            <div class="review-subtitle">Yanlış cevapladığın sorular</div>
        </div>
        <div class="mistake-list" id="mistake-list"></div>
        <div class="review-footer">
            <button class="close-review-btn" onclick="closeReview()">✓ Anladım, Geri Dön</button>
        </div>
    </div>
</div>

<script>
// ===================== KELIME LİSTESİ =====================
const masterList = [
{"d":"ön söz","y":"önsöz"},
{"d":"öngörü","y":"ön görü"},
{"d":"ön yargı","y":"önyargı"},
{"d":"önsezi","y":"ön sezi"},
{"d":"ön lisans","y":"önlisans"},
{"d":"ön kayıt","y":"önkayıt"},
{"d":"gözyaşı","y":"göz yaşı"},
{"d":"gözdağı","y":"göz dağı"},
{"d":"göz önü","y":"gözönü"},
{"d":"hoş geldin","y":"hoşgeldin"},
{"d":"hoşça kal","y":"hoşçakal"},
{"d":"hoşgörü","y":"hoş görü"},

// ===================== HIGH SCORE =====================
function loadHighScore() {
    const saved = localStorage.getItem('yksFlowHighScore');
    if (saved) highScore = parseInt(saved, 10);
    updateRecordDisplay();
}

function saveHighScore(newScore) {
    if (newScore > highScore) {
        highScore = newScore;
        localStorage.setItem('yksFlowHighScore', highScore);
        return true;
    }
    return false;
}

function updateRecordDisplay() {
    document.getElementById('record-score').textContent = highScore + " PTS";
}

// ===================== SHUFFLE =====================
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// ===================== Ki HAVUZU =====================
function buildKiPool() {
    let pool = [];
    const turler = Object.keys(kiDatabase.turler);
    // Her türden 15 soru oluştur
    turler.forEach(tur => {
        const turData = kiDatabase.turler[tur];
        for (let i = 0; i < 15; i++) {
            const d1 = turData.d1[Math.floor(Math.random() * turData.d1.length)];
            const d2 = turData.d2[Math.floor(Math.random() * turData.d2.length)];
            const jokerG = kiDatabase.jokerGiris[Math.floor(Math.random() * kiDatabase.jokerGiris.length)];
            const jokerB = kiDatabase.jokerBitis[Math.floor(Math.random() * kiDatabase.jokerBitis.length)];
            pool.push({ tur, d1, d2, jokerG, jokerB, turData });
        }
    });
    return shuffle(pool);
}

function setupKiCards() {
    const container = document.getElementById('cards-container');
    container.innerHTML = '';

    // Cümle kutusu
    const sentenceBox = document.createElement('div');
    sentenceBox.className = 'ki-sentence-box';

}

// ===================== Ki SORU ÜRET =====================
function nextKiQ() {
    if (kiPool.length === 0) {
        kiPool = buildKiPool();
    }
    currentKiQ = kiPool.pop();

    const { tur, d1, d2, jokerG, jokerB, turData } = currentKiQ;
    const dogruYazim = turData.dogruYazim; // 'bitisik' or 'ayri'

    // Türe göre prefix kullan — bağlaç ve kalıpta joker giriş cümleyi bozuyor
    const useJokerG = (tur === 'sifat' || tur === 'zamir') && Math.random() > 0.4;
    const useJokerB = Math.random() > 0.4;

    const prefix = useJokerG ? jokerG + ' ' : '';
    const suffix = useJokerB ? ' ' + jokerB : '.';

    // Butonları oluştur
    const btnDiv = document.getElementById('ki-buttons');
    btnDiv.innerHTML = '';

    // Cümleyi oluşturmak için yardımcı fonksiyon
    // "ki"yi her zaman boşlukla ayır, sonra CSS ile göster
    function buildSentence(pre, word, kiSpan, post, suf) {
        // pre: joker giriş, word: d1, kiSpan: vurgulu ki html, post: d2, suf: joker bitiş
        return `${pre}<span class="ki-word">${word}</span>${kiSpan}<span class="ki-post"> ${post}</span>${suf}`;
    }

    if (gameMode === 'easy') {
        const showCorrect = Math.random() > 0.5;
        let kiPart = '';
        if (showCorrect) {
            // Doğru yazımı göster
            if (dogruYazim === 'bitisik') {
                kiPart = `<span class="ki-highlight">ki</span>`;  // bitişik: boşluk yok önce
            } else {
                kiPart = ` <span class="ki-highlight">ki</span>`; // ayrı: boşluk var
            }
        } else {
            // Yanlış yazımı göster
            if (dogruYazim === 'bitisik') {
                kiPart = ` <span class="ki-highlight">ki</span>`; // yanlış: ayrı yazdık
            } else {
                kiPart = `<span class="ki-highlight">ki</span>`;  // yanlış: bitişik yazdık
            }
        }

        const displaySentence = `${prefix}<span class="ki-d1">${d1}</span>${kiPart} <span class="ki-d2">${d2}</span>${suffix}`;
        document.getElementById('ki-sentence-text').innerHTML = displaySentence;
        currentKiQ.showedCorrect = showCorrect;

        ['✅ Doğru', '❌ Yanlış'].forEach((label, idx) => {
            const btn = document.createElement('button');
            btn.className = 'ki-answer-btn';
            btn.textContent = label;
            const userSaysCorrect = idx === 0;
            btn.onclick = () => checkKiEasy(userSaysCorrect, btn);
            btnDiv.appendChild(btn);
        });

    } else {
        // Zor: tür hangisi?
        const allTurler = ['sifat', 'zamir', 'baglac', 'kalip'];
        const turLabels = {
            sifat: '🏷️ Sıfat Yapan "-ki"',
            zamir: '👤 İlgi Zamiri "-ki"',
            baglac: '🔗 Bağlaç "ki"',
            kalip: '📌 Kalıplaşmış "ki"'
        };

        let options = [tur];
        let others = allTurler.filter(t => t !== tur);
        shuffle(others);
        options = options.concat(others.slice(0, 2));
        shuffle(options);

        // Doğru yazımla göster
        let kiPart = '';
        if (dogruYazim === 'bitisik') {
            kiPart = `<span class="ki-highlight">ki</span>`;
        } else {
            kiPart = ` <span class="ki-highlight">ki</span>`;
        }

        const displaySentence = `${prefix}<span class="ki-d1">${d1}</span>${kiPart} <span class="ki-d2">${d2}</span>${suffix}`;
        document.getElementById('ki-sentence-text').innerHTML = displaySentence;
        currentKiQ.correctTur = tur;

        options.forEach((optTur) => {
            const btn = document.createElement('button');
            btn.className = 'ki-answer-btn';
            btn.textContent = turLabels[optTur];
            btn.onclick = () => checkKiHard(optTur, btn, turLabels);
            btnDiv.appendChild(btn);
        });
    }
}

// ===================== Ki CEVAP KONTROL (KOLAY) =====================
function checkKiEasy(userSaysCorrect, clickedBtn) {
    if (!gameActive || time <= 0) return;

    const isActuallyCorrect = currentKiQ.showedCorrect;
    const isRight = (userSaysCorrect === isActuallyCorrect);

    const allBtns = document.querySelectorAll('.ki-answer-btn');
    allBtns.forEach(b => b.onclick = null);

    if (isRight) {
        combo++;
        score += 10 * combo;
        if (combo > maxCombo) maxCombo = combo;
        if (combo % 5 === 0) {
            time += 10;
            document.getElementById('timer').classList.add('time-bonus');
            setTimeout(() => document.getElementById('timer').classList.remove('time-bonus'), 500);
        }
        clickedBtn.classList.add('correct');
        if (combo % 3 === 0) {
            gardenStr += flowers[Math.floor(Math.random() * flowers.length)];
            document.getElementById('garden-text').textContent = gardenStr;
        }
    } else {
        combo = 0;
        time = Math.max(0, time - 2);
        clickedBtn.classList.add('wrong');
        document.getElementById('timer').classList.add('time-penalty');
        setTimeout(() => document.getElementById('timer').classList.remove('time-penalty'), 500);

        wrongAnswers.push({
            type: 'ki-easy',
            sentence: document.getElementById('ki-sentence-text').innerHTML,
            correctType: currentKiQ.turData.tur,
            explanation: currentKiQ.turData.aciklama,
            showedCorrect: currentKiQ.showedCorrect
        });
    }

    updateDisplay();
    if (time <= 0) {
        setTimeout(endGame, 300);
    } else {
        setTimeout(nextKiQ, 500);
    }
}

// ===================== Ki CEVAP KONTROL (ZOR) =====================
function checkKiHard(selectedTur, clickedBtn, turLabels) {
    if (!gameActive || time <= 0) return;

    const allBtns = document.querySelectorAll('.ki-answer-btn');
    allBtns.forEach(b => b.onclick = null);

    if (selectedTur === currentKiQ.correctTur) {
        combo++;
        score += 10 * combo;
        if (combo > maxCombo) maxCombo = combo;
        if (combo % 5 === 0) {
            time += 10;
            document.getElementById('timer').classList.add('time-bonus');
            setTimeout(() => document.getElementById('timer').classList.remove('time-bonus'), 500);
        }
        clickedBtn.classList.add('correct');
        if (combo % 3 === 0) {
            gardenStr += flowers[Math.floor(Math.random() * flowers.length)];
            document.getElementById('garden-text').textContent = gardenStr;
        }
    } else {
        combo = 0;
        time = Math.max(0, time - 2);
        clickedBtn.classList.add('wrong');
        // Doğru cevabı göster
        allBtns.forEach(b => {
            if (b.textContent === turLabels[currentKiQ.correctTur]) {
                b.classList.add('correct');
            }
        });
        document.getElementById('timer').classList.add('time-penalty');
        setTimeout(() => document.getElementById('timer').classList.remove('time-penalty'), 500);

        wrongAnswers.push({
            type: 'ki-hard',
            sentence: document.getElementById('ki-sentence-text').innerHTML,
            correctType: currentKiQ.turData.tur,
            selectedType: selectedTur,
            explanation: currentKiQ.turData.aciklama
        });
    }

    updateDisplay();
    if (time <= 0) {
        setTimeout(endGame, 300);
    } else {
        setTimeout(nextKiQ, 600);
    }
}

// ===================== KELIME MODU KARTLARI =====================
function setupCards() {
    const container = document.getElementById('cards-container');
    container.innerHTML = '';
    const count = gameMode === 'easy' ? 2 : 4;
    for (let i = 0; i < count; i++) {
        const card = document.createElement('div');
        card.className = gameMode === 'easy' ? 'card' : 'card card-hard';
        card.id = `card${i}`;
        card.onclick = () => checkAnswer(i);
        card.innerHTML = `<div class="card-text ${gameMode === 'hard' ? 'card-text-hard' : ''}" id="btn${i}-text">...</div>`;
        container.appendChild(card);
    }
}

function updateDisplay() {
    document.getElementById('timer').textContent = time + "s";
    document.getElementById('score').textContent = score + " PTS";
    document.getElementById('combo').textContent = "🔥 " + combo;
}

function nextQ() {
    if (pool.length === 0) { pool = [...masterList]; shuffle(pool); }
    currentQ = pool.pop();
    if (gameMode === 'easy') setupEasyMode();
    else setupHardMode();
}

function setupEasyMode() {
    const rev = Math.random() > 0.5;
    if (rev) {
        document.getElementById('btn0-text').textContent = currentQ['y'];
        document.getElementById('btn1-text').textContent = currentQ['d'];
        correctIdx = 1;
    } else {
        document.getElementById('btn0-text').textContent = currentQ['d'];
        document.getElementById('btn1-text').textContent = currentQ['y'];
        correctIdx = 0;
    }
    for (let i = 0; i < 2; i++) document.getElementById(`card${i}`).classList.remove('correct', 'wrong');
}

function setupHardMode() {
    let tempPool = masterList.filter(item => item.d !== currentQ.d);
    shuffle(tempPool);
    let otherOptions = tempPool.slice(0, 3).map(item => item.y);
    hardModeOptions = [
        { text: currentQ.d, correct: true },
        { text: otherOptions[0], correct: false },
        { text: otherOptions[1], correct: false },
        { text: otherOptions[2], correct: false }
    ];
    shuffle(hardModeOptions);
    correctIdx = hardModeOptions.findIndex(opt => opt.correct);
    for (let i = 0; i < 4; i++) {
        document.getElementById(`btn${i}-text`).textContent = hardModeOptions[i].text;
        document.getElementById(`card${i}`).classList.remove('correct', 'wrong');
    }
}

function checkAnswer(idx) {
    if (!gameActive || time <= 0) return;
    const timerEl = document.getElementById('timer');

    if (idx === correctIdx) {
        combo++;
        score += 10 * combo;
        if (combo > maxCombo) maxCombo = combo;
        if (combo % 5 === 0) {
            time += 10;
            timerEl.classList.add('time-bonus');
            setTimeout(() => timerEl.classList.remove('time-bonus'), 500);
        }
        document.getElementById(`card${idx}`).classList.add('correct');
        if (combo % 3 === 0) {
            gardenStr += flowers[Math.floor(Math.random() * flowers.length)];
            document.getElementById('garden-text').textContent = gardenStr;
        }
    } else {
        combo = 0;
        time = Math.max(0, time - 2);
        if (gameMode === 'easy') {
            wrongAnswers.push({ type: 'kelime-easy', correct: currentQ.d, wrong: currentQ.y });
        } else {
            const clickedText = hardModeOptions[idx].text;
            const allWrongOptions = hardModeOptions.filter(opt => !opt.correct).map(opt => opt.text);
            wrongAnswers.push({ type: 'kelime-hard', correct: currentQ.d, selectedWrong: clickedText, allWrongOptions });
        }
        timerEl.classList.add('time-penalty');
        setTimeout(() => timerEl.classList.remove('time-penalty'), 500);
        document.getElementById(`card${idx}`).classList.add('wrong');
    }

    document.getElementById('score').textContent = score + " PTS";
    document.getElementById('combo').textContent = "🔥 " + combo;
    document.getElementById('timer').textContent = time + "s";

    if (time <= 0) setTimeout(endGame, 300);
    else setTimeout(nextQ, 300);
}

// ===================== TIMER =====================
function tick() {
    if (time > 0) {
        time--;
        document.getElementById('timer').textContent = time + "s";
        if (time <= 0) endGame();
    }
}

// ===================== OYUN BİTİŞ =====================
function endGame() {
    gameActive = false;
    clearInterval(timerInterval);
    const isNewRecord = saveHighScore(score);
    document.getElementById('game-content').style.display = 'none';
    document.getElementById('game-over').style.display = 'block';

    const finalScoreEl = document.getElementById('final-score');
    finalScoreEl.textContent = score + " PTS";

    if (isNewRecord) {
        finalScoreEl.classList.add('new-record');
        document.querySelector('.game-over h2').textContent = "🏆 YENİ REKOR!";
        document.querySelector('.game-over h2').style.color = "#FFD700";
    } else {
        finalScoreEl.classList.remove('new-record');
        document.querySelector('.game-over h2').textContent = "BİTTİ!";
        document.querySelector('.game-over h2').style.color = "#D32F2F";
    }

    document.getElementById('max-combo-display').textContent = "🔥 En Yüksek Combo: " + maxCombo;
    const reviewBtn = document.querySelector('.review-btn');
    if (wrongAnswers.length === 0) {
        reviewBtn.style.display = 'none';
    } else {
        reviewBtn.style.display = 'block';
        reviewBtn.textContent = `📋 Hataları Gözden Geçir (${wrongAnswers.length})`;
    }
}

// ===================== REVIEW =====================
function showReview() {
    const reviewScreen = document.getElementById('review-screen');
    const mistakeList = document.getElementById('mistake-list');
    mistakeList.innerHTML = '';
    reviewScreen.classList.remove('hard-mode-review');

    if (wrongAnswers.length === 0) {
        mistakeList.innerHTML = `<div class="no-mistakes"><div class="no-mistakes-icon">🎉</div><div class="no-mistakes-text">Mükemmel!<br>Hiç hata yapmadın!</div></div>`;
    } else {
        wrongAnswers.forEach((mistake, index) => {
            const item = document.createElement('div');
            item.className = 'mistake-item';

            if (mistake.type === 'kelime-easy') {
                item.innerHTML = `
                    <div class="mistake-row">
                        <span class="mistake-number">${index+1}</span>
                        <span class="wrong-answer">${mistake.wrong}</span>
                        <span class="arrow-icon">→</span>
                        <span class="correct-answer">${mistake.correct}</span>
                    </div>`;
            } else if (mistake.type === 'kelime-hard') {
                reviewScreen.classList.add('hard-mode-review');
                const otherWrongs = mistake.allWrongOptions.filter(w => w !== mistake.selectedWrong);
                item.innerHTML = `
                    <div class="mistake-row">
                        <span class="mistake-number">${index+1}</span>
                        <span class="correct-answer">${mistake.correct}</span>
                    </div>
                    <div class="all-wrong-options">
                        <div class="wrong-option-label">❌ Tüm yanlış seçenekler:</div>
                        <div class="wrong-options-list">
                            <span class="wrong-option-tag selected-wrong">${mistake.selectedWrong}</span>
                            ${otherWrongs.map(w => `<span class="wrong-option-tag">${w}</span>`).join('')}
                        </div>
                    </div>`;
            } else if (mistake.type === 'ki-easy') {
                item.classList.add('ki-review-item');
                item.innerHTML = `
                    <div class="mistake-row">
                        <span class="mistake-number">${index+1}</span>
                        <span style="font-weight:bold; color:#6A1B9A;">Tür: ${mistake.correctType}</span>
                    </div>
                    <div class="ki-sentence-review">${mistake.sentence}</div>
                    <div style="font-size:13px; color:#555; margin-top:5px;">📌 ${mistake.explanation}</div>`;
            } else if (mistake.type === 'ki-hard') {
                item.classList.add('ki-review-item');
                const turLabels = { sifat: 'Sıfat Yapan', zamir: 'İlgi Zamiri', baglac: 'Bağlaç', kalip: 'Kalıplaşmış' };
                item.innerHTML = `
                    <div class="mistake-row">
                        <span class="mistake-number">${index+1}</span>
                        <span class="ki-wrong-tag">❌ ${turLabels[mistake.selectedType] || mistake.selectedType}</span>
                        <span class="arrow-icon">→</span>
                        <span class="ki-correct-tag">✅ ${mistake.correctType}</span>
                    </div>
                    <div class="ki-sentence-review">${mistake.sentence}</div>
                    <div style="font-size:13px; color:#555; margin-top:5px;">📌 ${mistake.explanation}</div>`;
            }

            mistakeList.appendChild(item);
        });
    }
    reviewScreen.style.display = 'block';
}

function closeReview() {
    document.getElementById('review-screen').style.display = 'none';
}

// ===================== RESTART =====================
function restartGame() {
    pool = []; kiPool = [];
    score = 0; combo = 0; maxCombo = 0;
    gardenStr = ""; gameActive = true;
    selectedTime = 0; gameMode = ''; gameType = '';
    wrongAnswers = []; hardModeOptions = [];

    updateRecordDisplay();

    document.getElementById('game-over').style.display = 'none';
    document.getElementById('start-menu').style.display = 'flex';
    document.getElementById('game-content').style.display = 'none';
    document.getElementById('game-type-menu').style.display = 'none';

    document.querySelectorAll('.game-type-btn').forEach(b => b.classList.remove('selected-type'));
    document.getElementById('game-type-next-btn').disabled = true;
    resetModeSelection();
    resetTimeSelection();
    document.getElementById('garden-text').textContent = "";
}

loadHighScore();
</script>
